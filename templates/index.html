<!DOCTYPE html>
<html>
<head>
<title>🎧 Music Dashboard PRO Flask</title>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b0b0f;
    color:white;
}

header {
    text-align:center;
    padding:20px;
    color:#00ffcc;
    font-size:22px;
}

.container {
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap:20px;
    padding:20px;
}

.card {
    background:#16161d;
    border-radius:15px;
    padding:15px;
}

img {
    width:100%;
    border-radius:10px;
}

button {
    background:#00ffcc;
    border:none;
    padding:10px;
    margin:5px;
    border-radius:10px;
    cursor:pointer;
}

.queue-item {
    display:flex;
    gap:10px;
    background:#0f0f14;
    padding:8px;
    margin-bottom:8px;
    border-radius:10px;
}

.queue-item img {
    width:60px;
    border-radius:8px;
}

.small {
    font-size:12px;
    color:#aaa;
}
</style>
</head>

<body>

<header>🎧 Discord Music Bot Dashboard</header>

<div class="container">

<div class="card">
    <h3>Now Playing</h3>
    <div id="now">Loading...</div>
</div>

<div class="card">
    <h3>Controls</h3>
    <button onclick="send('pause')">⏸</button>
    <button onclick="send('resume')">▶</button>
    <button onclick="send('skip')">⏭</button>
    <button onclick="send('loop/song')">🔁 Song</button>
    <button onclick="send('loop/queue')">🔁 Queue</button>
</div>

<div class="card">
    <h3>Queue</h3>
    <div id="queue"></div>
</div>

</div>

<script>

const socket = io();

socket.on("update", (data) => {
    renderNow(data.current);
    renderQueue(data.queue);
});

function renderNow(current){
    let g = Object.keys(current || {})[0];
    let song = current?.[g];

    if(!song){
        document.getElementById("now").innerHTML = "Rien";
        return;
    }

    document.getElementById("now").innerHTML = `
        <img src="${song.thumbnail}">
        <h3>${song.title}</h3>
        <div class="small">⏱ ${song.duration || 0}s</div>
    `;
}

function renderQueue(queue){
    let html = "";

    for(let g in queue){
        queue[g].forEach(q => {
            html += `
            <div class="queue-item">
                <div>${q}</div>
            </div>`;
        });
    }

    document.getElementById("queue").innerHTML = html || "Vide";
}

function send(action){
    fetch("/"+action, {method:"POST"});
}

</script>

</body>
</html>
